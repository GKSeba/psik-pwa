<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
connect-src 'self' https://air-quality-api.open-meteo.com https://api.open-meteo.com;
img-src 'self' data:;
style-src 'self';
script-src 'self';
base-uri 'self';
form-action 'self';
object-src 'none';
upgrade-insecure-requests"
    />

    <meta name="referrer" content="no-referrer" />

    <meta http-equiv="Permissions-Policy" content="geolocation=(self)" />
    <title>Psik-a-Psik</title>

    <link
      rel="icon"
      type="image/png"
      href="./icons/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="shortcut icon" href="./icons/favicon.ico" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b5fff" />

    <link rel="icon" href="./icons/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="brand">
      <h1 class="brand__h1">
        <span class="sr-only">Psik-a-Psik</span>
        <img class="brand__logo" src="./icons/logo_main.png" alt="" />
      </h1>
    </div>

    <main class="card">
      <section class="row">
        <button id="btnGeo" type="button">Użyj mojej lokalizacji</button>
      </section>

      <section class="row">
        <!-- <input id="city" type="text" placeholder="Wpisz miasto" autocomplete="off"> -->
        <!-- <button id="btnSearch" type="button">Szukaj</button> -->
      </section>

      <!-- <ul id="results" class="results"></ul> -->

      <section class="status">
        <div><strong>Lokalizacja:</strong> <span id="place">—</span></div>
        <div><strong>Data:</strong> <span id="day">—</span></div>
        <div><strong>Status:</strong> <span id="msg">Gotowe</span></div>
      </section>

      <!-- WIDOK 1: TERAZ -->
      <section id="viewNow">
        <section class="weatherNow">
          <!-- ROW 1: pogoda + przycisk -->
          <div class="weatherNow__content">
            <div class="weatherNow__iconCol">
              <img id="wxIcon" class="weatherNow__icon" alt="" />
            </div>

            <div class="weatherNow__textStack">
              <div class="weatherNow__descCol">
                <div id="wxDesc" class="weatherNow__desc">—</div>
              </div>

              <div class="weatherNow__statsCol">
                <div class="weatherNow__line">
                  <span class="weatherNow__k">Odczuwalna:</span>
                  <span id="wxFeels" class="weatherNow__v">—</span>
                </div>
                <div class="weatherNow__line">
                  <span class="weatherNow__k">Wiatr:</span>
                  <span id="wxWind" class="weatherNow__v">—</span>
                </div>
              </div>
            </div>
          </div>

          <!-- ROW 2: prognoza godzinowa -->
          <div class="wxHint">
            <div id="wxStability" class="wxStability">—</div>
            <div
              id="wxNextHours"
              class="wxStrip"
              aria-label="Prognoza na najbliższe godziny"
            ></div>
          </div>
        </section>

        <h2>Stan powietrza</h2>
        <div id="air" class="grid"></div>
        <h2 class="mt14">Pyłki</h2>
        <div id="pollen" class="grid"></div>
      </section>

      <!-- WIDOK 2: PROGNOZA -->
      <section class="weatherCard">
        <div class="weatherCard__head">
          <h2 class="weatherCard__title">Pogoda (5 dni)</h3>
        </div>
        <div id="weatherDays" class="weatherDays"></div>
      </section>

      <section id="viewForecast" class="hidden">
        <h2>Pyłki (kolejne dni)</h2>
        <div id="forecastDays"></div>
      </section>
    </main>
    <footer class="footer">
      <div class="footer__row">
        <span>© <span id="year"></span> GKSeba</span>
        <span class="footer__sep">•</span>
        <a
          href="https://open-meteo.com/"
          target="_blank"
          rel="noopener noreferrer"
          >Dane: Open‑Meteo</a
        >
      </div>
      <div class="footer__note">
        Prognoza/model, nie pomiar. Informacyjnie – nie stanowi porady
        medycznej.
      </div>
    </footer>
    <button
      id="fabToggle"
      class="fab"
      type="button"
      aria-label="Pokaż prognozę"
      title="Prognoza pylenia"
    >
      Prognoza
    </button>
    <script src="./app.js"></script>
  </body>
</html>
